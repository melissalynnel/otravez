<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otra Vez | Unique treasures for your adornment and delight.</title>
    <meta
      name="description"
      content="Otra Vez is a collection of once-loved treasures, wearable stories, and artful objects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <main class="landing">
      <div class="glow glow-left"></div>
      <div class="glow glow-right"></div>
      <form class="signup-panel" id="signup-form">
        <div class="signup-row">
          <input
            class="signup-input"
            id="email"
            name="email"
            type="email"
            placeholder="stay in touch for updates"
            autocomplete="email"
            aria-label="Email address"
          />
          <button class="signup-button" type="submit" aria-label="Submit email">
            <svg
              class="signup-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M3 7.5A1.5 1.5 0 0 1 4.5 6h15A1.5 1.5 0 0 1 21 7.5v9A1.5 1.5 0 0 1 19.5 18h-15A1.5 1.5 0 0 1 3 16.5z"
              />
              <path d="m4 7 8 6 8-6" />
            </svg>
          </button>
        </div>
        <p class="signup-status" id="signup-status" aria-live="polite"></p>
      </form>
      <section class="hero-card">
        <header class="brand-lockup">
          <img
            class="brand-logo"
            src="./assets/otra-vez-logo-updated.png"
            alt="Otra Vez once again"
          />
        </header>

        <div
          class="subcopy-group"
          aria-label="unique treasures for your adornment and delight, wearables and art consultation"
        >
          <p class="subcopy">unique treasures for your adornment and delight</p>
          <p class="subcopy subcopy-secondary">wearables and art consultation</p>
        </div>

        <section class="details-grid">
          <div class="details-block details-left">
            <p>by appointment</p>
            <p>phone: 415-601-6755</p>
            <p>email: otravez.onceagain@gmail.com</p>
          </div>
          <div class="details-block details-right">
            <p>Gae Shulman</p>
            <p>Melissa Leavenworth</p>
            <p>find us at community fairs and markets</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
